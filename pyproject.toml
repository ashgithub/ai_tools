[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-tools"
version = "0.1.0"
description = "MCP Server for proofreading text using LLM models"
readme = "docs/README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.28.1",
    "langchain-openai>=1.0.1",
    "oci>=2.161.1",
    "openai>=2.6.0",
    "pydantic>=2.12.3",
    "pydantic-settings[yaml]>=2.0.0",
    "pyyaml>=6.0.0",
    "fastmcp>=0.9.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pytest>=7.0.0",
]

[project.scripts]
proofread-server = "ai_tools.aitools_mcp_server:main"
ai-tools = "ai_tools.aitools_mcp_server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_tools"]

[dependency-groups]
dev = [
    "mypy>=1.18.2",
    "ruff>=0.14.1",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "mypy>=1.0.0",
    "pytest>=7.0.0",
]
