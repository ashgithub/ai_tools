# AI Tools Configuration

oci:
  service_endpoint: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com"
  base_url: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/20231130/actions/v1"
  compartment: "ocid1.compartment.oc1..aaaaaaaac3cxhzoka75zaaysugzmvhm3ni3keqvikawjxvwpz26mud622owa"
  profile: "API-USER"
  default_model: "openai.gpt-5.4"

model_cache:
  enabled: true
  directory: ".cache"
  filename: "oci_models_cache.json"
  refresh_hours: 24

agentic_routing:
  enabled: true
  default_nudge: "auto"
  nudge_presets:
    - auto
    - proofread
    - slack
    - email
    - commands
    - explain
    - ask
  nudge_prompts:
    auto: "Look at your list of skills and given text and pick the one that best matches the user intent and then answer the text using that skill" 
    proofread: "Proofread the given text. Return corrected and rewritten versions."
    slack: "find a skill to proof read the given text for Slack"
    email: "Proofread the given text for email. Keep it clear, professional, and polished."
    commands: "find a skill to recommend 1 to 3 commands for the given text"
    explain: "Find a skill to explain the given text"
    ask: "Answer the given question directly and concisely."

logging:
  level: "ERROR"
