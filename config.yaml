# AI Tools Configuration
# All constants, prompts, configurations, and URLs

# OCI Configuration
oci:
  service_endpoint: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com"
  base_url: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/20231130/actions/v1"
  compartment: "ocid1.compartment.oc1..aaaaaaaac3cxhzoka75zaaysugzmvhm3ni3keqvikawjxvwpz26mud622owa"
  profile: "API-USER"
  default_model: "xai.grok-4-fast-non-reasoning"

# Available LLM Models
models:
  - "meta.llama-3.1-405b-instruct"
  - "meta.llama-3.2-90b-vision-instruct"
  - "meta.llama-3.3-70b-instruct"
  - "meta.llama-4-maverick-17b-128e-instruct-fp8"
  - "meta.llama-4-scout-17b-16e-instruct"
  - "openai.gpt-4.1"
  - "openai.gpt-4.1-mini"
  - "openai.gpt-4.1-nano"
  - "openai.gpt-4o"
  - "openai.gpt-4o-mini"
  - "openai.gpt-4o-mini-search-preview"
  - "openai.gpt-4o-search-preview"
  - "openai.gpt-5"
  - "openai.gpt-5-mini"
  - "openai.gpt-5-nano"
  - "openai.o1"
  - "openai.o3"
  - "openai.o3-mini"
  - "openai.o4-mini"
  - "openai.gpt-oss-20b"
  - "openai.gpt-oss-120b"
  - "xai.grok-3"
  - "xai.grok-3-fast"
  - "xai.grok-3-mini"
  - "xai.grok-3-mini-fast"
  - "xai.grok-4"
  - "xai.grok-4-fast-non-reasoning"
  - "xai.grok-4-fast-reasoning"
  - "xai.grok-code-fast-1"

# Prompts
prompts:
  rewrite_allowed: |
    You CAN rewrite the text to improve clarity, structure, and effectiveness while maintaining the original meaning.
    Make it more professional, clear, and well-structured.

  rewrite_forbidden: |
    You CANNOT rewrite the text - only fix typos, grammar, punctuation, and spelling errors.
    Do not change the wording, structure, or meaning - just correct errors.

  output_instruction: |
    Return only the corrected/proofread text, nothing else.
    Do not include quotes around the result unless they are part of the text.

# Tab-specific Prompts
tab_prompts:
  Proofread:
    contexts:
      general: "You are a professional proofreader. Your task is to improve the following text."
      slack: "Proofread this as a Slack message: keep it concise, friendly, professional, and use relevant emojis if appropriate."
      email: "Proofread this as a business email: ensure a professional tone, proper structure, greeting, and closing."
  Explain: "Explain the following content in an easy to understand paragraph for a general audience:\n\nContent:\n{input}"
  Commands: "List 1 to 3 alternative command-line commands to accomplish the given task (no explanation, no comments). for {os} operating system.\n\nTask:\n{input}"
  Q&A: "Answer the following question as accurately and concisely as possible:\n\nQuestion:\n{input}"

# Tab Configurations
tabs:
  Proofread:
    input_label: "Text to Proofread:"
    sample_text: "i had s agreat tuime when i met yuo\n- lest meet again \n- yi choose trh palce\n0 you chsoe teh tm"
    prompt_section_label: "Text"
    button_text: "Proofread"
    config_frame: "_create_context_frame"
    max_tokens: 1000
    temperature: 0.3
  Explain:
    input_label: "Technical Text to Explain:"
    sample_text: "SSH keys are cryptographic key pairs used for secure authentication to remote systems. The public key is placed on the server, while the private key remains on the client machine."
    prompt_section_label: "Content"
    button_text: "Explain"
    config_frame: null
    max_tokens: 400
    temperature: 0.2
  Commands:
    input_label: "Task Description:"
    sample_text: "copy my SSH public key to clipboard"
    prompt_section_label: "Task"
    button_text: "Get Commands"
    config_frame: "_create_os_frame"
    max_tokens: 256
    temperature: 0.2
  Q&A:
    input_label: "Question:"
    sample_text: "What is the capital of France?"
    prompt_section_label: "Question"
    button_text: "Ask"
    config_frame: null
    max_tokens: 1000
    temperature: 0.7

# Commands Configuration
commands:
  os_options: ["macos", "linux"]

# Logging Configuration
logging:
  level: "DEBUG"

# App to Tab Mappings
# Tab-oriented mappings with list of apps per config
app_mappings:
  Proofread:
    - context: email
      apps: [mail, outlook, thunderbird, gmail, applemail]
    - context: slack
      apps: [slack, discord, teams, mattermost, zoom, skype, whatsapp]
  Explain:
    - apps: [safari, chrome, firefox, edge, opera, brave, arc, vivaldi]
  Commands:
    - os: macos
      apps: [terminal, iterm2, alacritty, hyper, warp, tabby, kitty, terminator]
  Q&A:
    - apps: []  # Default if no app or no match
