# AI Tools Configuration

# OCI Configuration
oci:
  service_endpoint: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com"
  base_url: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/20231130/actions/v1"
  compartment: "ocid1.compartment.oc1..aaaaaaaac3cxhzoka75zaaysugzmvhm3ni3keqvikawjxvwpz26mud622owa"
  profile: "API-USER"
  default_model: "xai.grok-4-fast-non-reasoning"

# Model cache settings
model_cache:
  enabled: true
  directory: ".cache"
  filename: "oci_models_cache.json"
  refresh_hours: 24

# Tab Configurations
tabs:
  Proofread:
    input_label: "Text to Proofread:"
    button_text: "Proofread"
    config_frame: "_create_context_frame"
  Explain:
    input_label: "Technical Text to Explain:"
    button_text: "Explain"
    config_frame: null
  Commands:
    input_label: "Task Description:"
    button_text: "Get Commands"
    config_frame: "_create_os_frame"
  Q&A:
    input_label: "Question:"
    button_text: "Ask"
    config_frame: null

# Commands Configuration
commands:
  os_options: ["macos", "linux"]

# Logging Configuration
logging:
  level: "ERROR"

# App to Tab Mappings
# Tab-oriented mappings with list of apps per config
app_mappings:
  Proofread:
    - context: email
      apps: [mail, outlook, thunderbird, gmail, applemail]
    - context: slack
      apps: [slack, discord, teams, mattermost, zoom, skype, whatsapp]
  Explain:
    - apps: [safari, chrome, code, firefox, edge, opera, brave, arc, vivaldi]
  Commands:
    - os: macos
      apps: [terminal, iterm2, alacritty, hyper, warp, tabby, kitty, terminator]
  Q&A:
    - apps: []  # Default if no app or no match
